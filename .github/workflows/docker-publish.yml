name: Build & publish Docker images

# New release -> new images. On every v* tag (and on demand), build both the
# web and mcp images and push them to GitHub Container Registry, tagged with
# the release version (plus major.minor and latest).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# GITHUB_TOKEN needs to read the repo and write packages (ghcr); nothing else.
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: web
            dockerfile: Dockerfile.web
          - image: mcp
            dockerfile: Dockerfile.mcp
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io/<owner>/<repo>/<web|mcp>
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
