name: Build & publish Docker images

# New release -> new images. On every v* tag (and on demand), build both the
# web and mcp images and push them to GitHub Container Registry, tagged with
# the release version (plus major.minor and latest).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# GITHUB_TOKEN needs to read the repo and write packages (ghcr); nothing else.
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: web
            dockerfile: Dockerfile.web
          - image: mcp
            dockerfile: Dockerfile.mcp
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # QEMU lets the amd64 runner also build the arm64 image, so the published
      # images run natively on both Intel and Apple Silicon (arm64) machines.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          # ghcr.io/<owner>/<repo>/<web|mcp>
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry-backed build cache (a per-image `buildcache` tag in GHCR).
          # This workflow only runs on tags, and GitHub Actions (`type=gha`)
          # cache is scoped per git ref -- so a tag run could never reuse a
          # previous tag's cache, and every release rebuilt from scratch
          # (re-pulling the ~2.5GB Playwright base + re-running pip install for
          # both arches). A registry cache is ref-agnostic: every release reuses
          # it, so unchanged layers (base image, dependency install) are skipped.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.image }}:buildcache,mode=max
