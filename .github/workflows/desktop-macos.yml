name: Build macOS desktop app

# Build the native macOS .app + .dmg on every release tag (and on demand), and
# attach the .dmg to the GitHub Release. Separate from docker-publish.yml so the
# web/mcp image publish is unaffected. Unsigned dev build; Chromium is fetched on
# first run, so the .dmg stays small.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # upload the .dmg asset to the release

jobs:
  build:
    name: macOS .dmg
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the desktop app + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ./core -e ./web -e ./desktop pyinstaller

      - name: Build .app + .dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"          # v1.2.3 -> 1.2.3 (blank for manual runs)
          packaging/macos/build.sh "${VERSION:-0.0.0-dev}"

      - name: Attach .dmg to the release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" packaging/macos/dist/BookVault-*.dmg --clobber

      - name: Upload .dmg as a workflow artifact (also for manual runs)
        uses: actions/upload-artifact@v7
        with:
          name: BookVault-macos-dmg
          path: packaging/macos/dist/BookVault-*.dmg
          if-no-files-found: error
