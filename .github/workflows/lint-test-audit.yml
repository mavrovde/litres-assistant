name: Lint, Test & Audit

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for GITHUB_TOKEN: every job here only checks out
# code and reads dependencies, none of them write anything back to the repo.
permissions:
  contents: read

# A new push to the same branch/PR supersedes any run already in flight for
# it -- no point burning runner minutes on a commit that's already stale.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/pyproject.toml"

      - name: Install lint tooling
        run: pip install ".[dev]"

      - name: Run ruff checks
        run: ruff check .

  test:
    name: Test suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches the "Python 3.11+" floor called out in the README.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "**/pyproject.toml"

      # No `playwright install` step needed: the test suite never launches a
      # real browser (LitresClient is always faked/bypassed -- see
      # tests/fakes.py), so only the Python packages are required, not the
      # Chromium binary. Editable installs of all three subprojects (core
      # first so `litres-core` resolves for web/mcp) plus the dev tooling.
      - name: Install subprojects and test tooling
        run: pip install -e ./core -e ./web -e ./mcp -e ".[dev]"

      - name: Run pytest with coverage
        run: python -m pytest -v --cov=litres_core --cov=litres_web --cov=litres_mcp --cov-report=term-missing

  audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/pyproject.toml"

      # Install the three subprojects' *runtime* dependencies (non-editable),
      # then audit the resulting environment. No dev/test tooling is installed
      # here, so the scan covers only what actually ships.
      - name: Install runtime dependencies and pip-audit
        run: pip install ./core ./web ./mcp pip-audit

      - name: Scan installed dependencies with pip-audit
        # --skip-editable is a no-op here (nothing editable), but keep the
        # local, unpublished subproject packages out of the advisory lookup.
        run: pip-audit --skip-editable
