<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LitRes Library Downloader</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 4rem auto; color: #222; }
    input { display: block; width: 100%; margin: 0.5rem 0; padding: 0.5rem; box-sizing: border-box; }
    button { padding: 0.6rem 1.2rem; cursor: pointer; }
    .error { color: #b00020; }
  </style>
</head>
<body>
  <h1>My LitRes Library</h1>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  {% if logged_in %}
    <p>Logged in as <strong>{{ login }}</strong>.</p>
    <p><a href="/download"><button type="button">Download my library (.zip)</button></a></p>
    <form method="post" action="/logout">
      <button type="submit">Log out</button>
    </form>
  {% else %}
    <form method="post" action="/login">
      <input type="text" name="login" placeholder="Email or phone" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log in</button>
    </form>
  {% endif %}
</body>
</html>
